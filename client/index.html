<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/hya-logo.png" />
    <link rel="apple-touch-icon" href="/hya-logo.png" />
    <title>HYA Tech Employee Management System</title>
    <script>
      try {
        const theme = localStorage.getItem("hya_theme");
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme === "dark" ? "dark" : "light";
      } catch {
        document.documentElement.style.colorScheme = "light";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
